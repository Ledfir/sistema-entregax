<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Iconos PWA</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        canvas {
            border: 1px solid #ddd;
            margin: 10px;
            border-radius: 8px;
        }
        button {
            background: #f39915;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            margin: 5px;
        }
        button:hover {
            background: #d48313;
        }
        .icon-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }
        .icon-item {
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Generador de Iconos PWA para Sistema EntregaX</h1>
    <p>Esta herramienta genera los iconos necesarios para la PWA.</p>
    
    <div>
        <input type="file" id="logoInput" accept="image/*">
        <button onclick="generateIcons()">Generar Iconos</button>
    </div>

    <div class="icon-container" id="iconContainer"></div>

    <script>
        const sizes = [192, 512];
        let logoImage = null;

        document.getElementById('logoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                logoImage = new Image();
                logoImage.onload = function() {
                    alert('Logo cargado. Haz clic en "Generar Iconos"');
                };
                logoImage.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        function generateIcons() {
            if (!logoImage) {
                alert('Por favor, carga primero el logo');
                return;
            }

            const container = document.getElementById('iconContainer');
            container.innerHTML = '';

            sizes.forEach(size => {
                // Icon normal
                const canvasNormal = createIcon(size, false);
                addIconToPage(canvasNormal, size, 'normal', container);

                // Icon maskable
                const canvasMaskable = createIcon(size, true);
                addIconToPage(canvasMaskable, size, 'maskable', container);
            });
        }

        function createIcon(size, isMaskable) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            // Fondo naranja
            ctx.fillStyle = '#f39915';
            ctx.fillRect(0, 0, size, size);

            // Calcular tamaño del logo
            const padding = isMaskable ? size * 0.25 : size * 0.1;
            const logoSize = size - (padding * 2);
            const x = (size - logoSize) / 2;
            const y = (size - logoSize) / 2;

            // Dibujar logo
            ctx.drawImage(logoImage, x, y, logoSize, logoSize);

            return canvas;
        }

        function addIconToPage(canvas, size, type, container) {
            const div = document.createElement('div');
            div.className = 'icon-item';
            
            const title = document.createElement('h3');
            title.textContent = `${size}x${size} (${type})`;
            div.appendChild(title);
            
            const displayCanvas = canvas.cloneNode(true);
            displayCanvas.style.width = '150px';
            displayCanvas.style.height = '150px';
            div.appendChild(displayCanvas);
            
            const downloadBtn = document.createElement('button');
            const filename = type === 'maskable' 
                ? `pwa-maskable-${size}x${size}.png`
                : `pwa-${size}x${size}.png`;
            downloadBtn.textContent = `Descargar ${filename}`;
            downloadBtn.onclick = () => downloadCanvas(canvas, filename);
            div.appendChild(downloadBtn);
            
            container.appendChild(div);
        }

        function downloadCanvas(canvas, filename) {
            const link = document.createElement('a');
            link.download = filename;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
</html>
